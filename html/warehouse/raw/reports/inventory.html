<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Report - Warehouse Raw | Highland Fresh</title>

    <!-- Tailwind + DaisyUI (pre-built, no CDN runtime) -->
    <link rel="stylesheet" href="../../../../css/tailwind.css">

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .bento-card { transition: transform 0.3s ease-out, box-shadow 0.3s ease-out; }
        .bento-card:hover { transform: translateY(-0.25rem); box-shadow: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -4px rgba(0,0,0,.1); }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: oklch(var(--b2)); }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: oklch(var(--bc) / 0.2); border-radius: 3px; }
        .sidebar-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat-value { font-variant-numeric: tabular-nums; }
    </style>
</head>

<body class="bg-base-200 min-h-screen">

    <!-- Mobile Sidebar Backdrop -->
    <div id="sidebarBackdrop" class="fixed inset-0 bg-black/50 z-40 lg:hidden hidden" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar"
        class="fixed left-0 top-0 h-full w-72 bg-base-100 border-r border-base-300 z-50 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
        <!-- Populated by js/warehouse/raw-sidebar.js -->
    </aside>

<!-- Main Content -->
    <div class="lg:ml-72 min-h-screen flex flex-col">
        <header class="navbar bg-base-100 border-b border-base-300 sticky top-0 z-30 px-4 lg:px-6">
            <div class="flex-none lg:hidden"><button class="btn btn-ghost btn-square" onclick="toggleSidebar()"><i class="fas fa-bars text-lg"></i></button></div>
            <div class="flex-1">
                <div class="text-xs text-base-content/60">Warehouse Raw / Reports</div>
                <h1 class="text-lg lg:text-xl font-bold">Inventory Report</h1>
            </div>
            <div class="flex-none flex items-center gap-2">
                <button class="btn btn-ghost btn-sm" onclick="loadReport()"><i class="fas fa-sync-alt"></i></button>
                <button class="btn btn-primary btn-sm gap-2" onclick="exportCSV()"><i class="fas fa-file-csv"></i><span class="hidden sm:inline">Export CSV</span></button>
            </div>
        </header>

        <main class="flex-1 p-4 lg:p-6">

            <!-- Summary Stats -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bento-card card bg-base-100 border border-base-300">
                    <div class="card-body p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-primary/10 flex items-center justify-center"><i class="fas fa-boxes-stacked text-primary"></i></div>
                            <div>
                                <p class="text-2xl font-bold stat-value" id="statTotal">0</p>
                                <p class="text-xs text-base-content/60">Total Items</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bento-card card bg-base-100 border border-base-300">
                    <div class="card-body p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-info/10 flex items-center justify-center"><i class="fas fa-coins text-info"></i></div>
                            <div>
                                <p class="text-2xl font-bold stat-value" id="statValue">₱0</p>
                                <p class="text-xs text-base-content/60">Total Value</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bento-card card bg-base-100 border border-base-300">
                    <div class="card-body p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-warning/10 flex items-center justify-center"><i class="fas fa-exclamation-triangle text-warning"></i></div>
                            <div>
                                <p class="text-2xl font-bold stat-value" id="statLow">0</p>
                                <p class="text-xs text-base-content/60">Low Stock</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bento-card card bg-base-100 border border-base-300">
                    <div class="card-body p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-error/10 flex items-center justify-center"><i class="fas fa-circle-exclamation text-error"></i></div>
                            <div>
                                <p class="text-2xl font-bold stat-value" id="statOut">0</p>
                                <p class="text-xs text-base-content/60">Out of Stock</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="card bg-base-100 border border-base-300 mb-6">
                <div class="card-body p-4">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                        <div class="form-control">
                            <label class="input input-bordered input-sm flex items-center gap-2">
                                <i class="fas fa-search text-base-content/40"></i>
                                <input type="text" id="searchInput" class="grow" placeholder="Search by name or code..." />
                            </label>
                        </div>
                        <select class="select select-bordered select-sm" id="typeFilter">
                            <option value="all">All Types</option>
                            <option value="ingredient">Ingredients</option>
                            <option value="mro">MRO Supplies</option>
                        </select>
                        <select class="select select-bordered select-sm" id="statusFilter">
                            <option value="all">All Statuses</option>
                            <option value="out">Out of Stock</option>
                            <option value="low">Low Stock</option>
                            <option value="ok">In Stock</option>
                        </select>
                        <button class="btn btn-ghost btn-sm" onclick="loadReport()">
                            <i class="fas fa-sync-alt"></i> Refresh
                        </button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card bg-base-100 border border-base-300">
                <div class="overflow-x-auto">
                    <table class="table table-sm">
                        <thead>
                            <tr class="bg-base-200/50 text-base-content/70">
                                <th>Code</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th class="text-right">Current</th>
                                <th class="text-right">Min</th>
                                <th class="text-right">Max</th>
                                <th>Status</th>
                                <th>Last Movement</th>
                            </tr>
                        </thead>
                        <tbody id="reportTableBody">
                            <tr>
                                <td colspan="9" class="text-center py-12">
                                    <span class="loading loading-spinner loading-md text-primary"></span>
                                    <p class="text-base-content/60 mt-2 text-sm">Loading inventory...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            const b = document.getElementById('sidebarBackdrop');
            if (s) s.classList.toggle('-translate-x-full');
            if (b) b.classList.toggle('hidden');
        }
    </script>
    <script src="../../../../js/vendor/axios.min.js"></script>
    <script src="../../../../js/config/api.js"></script>
    <script src="../../../../js/config/auth.js"></script>
    <script src="../../../../js/warehouse/raw.service.js"></script>
    <script>window.WAREHOUSE_RAW_ACTIVE_PAGE = "inventory_report";</script>
    <script src="../../../../js/warehouse/raw-sidebar.js?v=20260712c"></script>
    <script src="../../../../js/warehouse/sidebar.stats.js?v=20260712c"></script>

    <script>
        const state = { items: [], stats: null, filters: { type: 'all', status: 'all', search: '' } };

        function debounce(fn, wait) { let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); }; }

        function setSidebarUser(user) {
            if (!user) return;
            const first = user.first_name || '';
            const last = user.last_name || '';
            const nameEl = document.getElementById('sidebarUserName');
            const initEl = document.getElementById('userInitials');
            if (nameEl) nameEl.textContent = `${first} ${last}`.trim() || user.username || 'Warehouse Staff';
            if (initEl) {
                initEl.textContent = ((first[0] || '') + (last[0] || '')).toUpperCase()
                    || (user.username || 'WR').slice(0, 2).toUpperCase() || 'WR';
            }
            if (window.WarehouseRawSidebar && typeof WarehouseRawSidebar.fillUser === 'function') {
                WarehouseRawSidebar.fillUser();
            }
        }

        async function loadReport() {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12"><span class="loading loading-spinner loading-md text-primary"></span><p class="text-base-content/60 mt-2 text-sm">Loading inventory…</p></td></tr>`;
            try {
                const response = await WarehouseRawService.getInventoryReport(state.filters);
                if (response.success) {
                    // Collapse the legacy Critical tier into Low Stock. The
                    // backend report still emits status='critical'; the
                    // frontend treats every low-inventory row as Low Stock.
                    state.items = (response.data.items || []).map(it => ({
                        ...it,
                        status: it.status === 'critical' ? 'low' : it.status
                    }));
                    state.stats = response.data.stats;
                    renderStats();
                    renderTable();
                } else {
                    tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12 text-base-content/60">${escapeHtml(response.message || 'Failed to load report')}</td></tr>`;
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12 text-error">Failed to load report: ${escapeHtml(err.message || 'unknown error')}</td></tr>`;
            }
        }

        function renderStats() {
            const s = state.stats;
            if (!s) return;
            document.getElementById('statTotal').textContent = (s.total_items || 0).toLocaleString();
            document.getElementById('statValue').textContent = '₱' + Number(s.total_value || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('statLow').textContent = ((s.low_count || 0) + (s.critical_count || 0)).toLocaleString();
            document.getElementById('statOut').textContent = (s.out_count || 0).toLocaleString();
        }

        function statusBadge(status) {
            const map = {
                out: { cls: 'badge-ghost',   text: 'Out' },
                low: { cls: 'badge-warning', text: 'Low' },
                ok:  { cls: 'badge-success', text: 'OK' },
            };
            const s = map[status] || { cls: 'badge-ghost', text: status };
            return `<span class="badge ${s.cls} badge-sm">${s.text}</span>`;
        }

        function statusDot(status) {
            const map = { out: 'bg-base-300', low: 'bg-warning', ok: 'bg-success' };
            return `<span class="inline-block w-2.5 h-2.5 rounded-full ${map[status] || 'bg-base-300'}"></span>`;
        }

        function renderTable() {
            const tbody = document.getElementById('reportTableBody');
            if (!state.items.length) {
                tbody.innerHTML = `<tr><td colspan="9" class="text-center py-12 text-base-content/60"><i class="fas fa-inbox text-4xl text-base-content/20 mb-2"></i><h3 class="font-semibold mt-2">No items match your filters</h3><p class="text-sm">Try adjusting the search or filters above</p></td></tr>`;
                return;
            }

            const typeBadge = (t) => t === 'mro'
                ? '<span class="badge badge-ghost badge-sm">MRO</span>'
                : '<span class="badge badge-outline badge-sm">Ingredient</span>';

            tbody.innerHTML = state.items.map(item => {
                const stockPct = item.maximum_stock > 0 ? Math.min(100, (item.current_stock / item.maximum_stock) * 100) : 0;
                return `
                    <tr class="hover:bg-base-200/50">
                        <td><div class="flex items-center gap-2">${statusDot(item.status)}<span class="font-mono text-xs">${escapeHtml(item.code || '-')}</span></div></td>
                        <td>
                            <div class="font-semibold text-sm">${escapeHtml(item.name || '-')}</div>
                            ${item.is_critical ? '<i class="fas fa-shield-halved text-error text-[10px]" title="Critical spare part"></i>' : ''}
                        </td>
                        <td class="text-sm">${escapeHtml(item.category || '—')}</td>
                        <td>${typeBadge(item.item_type)}</td>
                        <td class="text-right">
                            <div class="font-mono font-bold">${item.current_stock.toLocaleString()} <span class="text-xs font-normal text-base-content/60">${escapeHtml(item.unit || '')}</span></div>
                            <div class="w-20 h-1 bg-base-200 rounded-full overflow-hidden mt-1 inline-block">
                                <div class="h-full rounded-full ${item.status === 'ok' ? 'bg-success' : item.status === 'low' ? 'bg-warning' : 'bg-error'}" style="width: ${stockPct}%"></div>
                            </div>
                        </td>
                        <td class="text-right font-mono text-sm text-base-content/70">${item.minimum_stock.toLocaleString()}</td>
                        <td class="text-right font-mono text-sm text-base-content/70">${item.maximum_stock.toLocaleString()}</td>
                        <td>${statusBadge(item.status)}</td>
                        <td class="text-sm text-base-content/60">${item.last_movement ? new Date(item.last_movement).toLocaleString() : '—'}</td>
                    </tr>
                `;
            }).join('');
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function exportCSV() {
            if (!state.items.length) return;
            const rows = [['Code', 'Name', 'Type', 'Category', 'Unit', 'Current Stock', 'Min', 'Max', 'Status', 'Value (PHP)', 'Last Movement']];
            state.items.forEach(item => {
                rows.push([
                    item.code || '',
                    item.name || '',
                    item.item_type || '',
                    item.category || '',
                    item.unit || '',
                    item.current_stock,
                    item.minimum_stock,
                    item.maximum_stock,
                    item.status || '',
                    item.value || 0,
                    item.last_movement || ''
                ]);
            });
            const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `inventory_report_${new Date().toISOString().slice(0, 10)}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof AuthService !== 'undefined' && AuthService.requireAuth && !AuthService.requireAuth()) {
                return;
            }
            if (typeof AuthService !== 'undefined' && !AuthService.isAuthenticated()) {
                window.location.href = (typeof APP_BASE === 'string' ? APP_BASE : '/HighlandFreshAppV4') + '/html/login.html';
                return;
            }

            setSidebarUser(AuthService.getCurrentUser());

            document.getElementById('typeFilter')?.addEventListener('change', (e) => { state.filters.type = e.target.value; loadReport(); });
            document.getElementById('statusFilter')?.addEventListener('change', (e) => { state.filters.status = e.target.value; loadReport(); });
            document.getElementById('searchInput')?.addEventListener('input', debounce((e) => { state.filters.search = e.target.value; loadReport(); }, 300));

            loadReport();
        });
    </script>
</body>
</html>
